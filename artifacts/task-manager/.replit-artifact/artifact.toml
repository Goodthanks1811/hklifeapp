kind = "mobile"
previewPath = "/"
title = "Task Manager"
version = "1.0.0"
id = "artifacts/task-manager"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18592

[services.development]
run = "pnpm --filter @workspace/task-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/task-manager", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/task-manager", "run", "serve" ]

[services.env]
PORT = "18592"
BASE_PATH = "/"
